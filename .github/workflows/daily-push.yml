name: 微信大V爆文日报推送

on:
  # 主定时: 北京时间8:03 = UTC 0:03
  # 避开整点和半点,减少GitHub调度延迟
  schedule:
    - cron: '3 0 * * *'    # 北京时间 8:03
    - cron: '17 0 * * *'   # 北京时间 8:17 (备用,主时间失败时兜底)
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  # 去重: 同一天只运行一次
  check-date:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: 检查今天是否已运行
        id: check
        run: |
          # 获取北京时间今天的日期
          TODAY=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          # 用GitHub Cache标记今天是否已运行
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          
      - name: 检查缓存
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/daily-push-marker
          key: daily-push-${{ steps.check.outputs.today }}
          
      - name: 判断是否需要运行
        id: final
        run: |
          if [ -f /tmp/daily-push-marker ]; then
            echo "今天已运行过,跳过"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "今天未运行,继续执行"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  push-daily:
    needs: check-date
    if: needs.check-date.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行抓取和推送
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python3 wechat_hot_push.py
      
      - name: 标记今天已运行
        run: echo "done" > /tmp/daily-push-marker
      
      - name: 保存HTML报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report-${{ github.run_number }}
          path: output/latest.html
          retention-days: 30
      
      - name: 保存JSON数据
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-data-${{ github.run_number }}
          path: output/latest.json
          retention-days: 30