name: 微信财经大V爆文日报推送

on:
  # 主定时: 北京时间8:03 = UTC 0:03
  schedule:
    - cron: '3 0 * * *'    # 北京时间 8:03
    - cron: '17 0 * * *'   # 北京时间 8:17 (备用兜底)
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  # 定时任务去重: 同一天cron只运行一次(手动触发不受限制)
  check-date:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: 判断是否需要运行
        id: check
        run: |
          # 手动触发时总是运行
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手动触发,强制运行"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # cron触发时,检查今天是否已运行
          TODAY=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          CACHE_KEY="daily-push-${TODAY}"
          
          # 尝试创建缓存,如果已存在说明今天已运行
          CACHE_HIT=$(gh cache list -R ${{ github.repository }} -L 100 | grep -c "$CACHE_KEY" || true)
          
          if [ "$CACHE_HIT" -gt 0 ]; then
            echo "今天cron已运行过,跳过"
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "今天cron未运行,继续执行"
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-daily:
    needs: check-date
    if: needs.check-date.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行抓取和推送
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python3 wechat_hot_push.py
      
      - name: 标记今天已运行(cron去重)
        if: github.event_name == 'schedule'
        uses: actions/cache/save@v4
        with:
          path: /tmp/daily-push-marker
          key: daily-push-$(TZ=Asia/Shanghai date +%Y-%m-%d)
      
      - name: 保存HTML报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report-${{ github.run_number }}
          path: output/latest.html
          retention-days: 30
      
      - name: 保存JSON数据
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-data-${{ github.run_number }}
          path: output/latest.json
          retention-days: 30