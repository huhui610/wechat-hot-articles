name: 微信10万+爆文日报推送

on:
  # 定时触发: 北京时间8:03 = UTC 0:03
  # GitHub Actions cron使用UTC时间,北京=UTC+8
  schedule:
    - cron: '3 0 * * *'
  
  # 允许手动触发(用于测试)
  workflow_dispatch:

jobs:
  push-daily:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 执行抓取和推送
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: python3 wechat_hot_push.py
      
      - name: 保存HTML报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report-${{ github.run_number }}
          path: output/latest.html
          retention-days: 30
      
      - name: 保存JSON数据
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-data-${{ github.run_number }}
          path: output/latest.json
          retention-days: 30